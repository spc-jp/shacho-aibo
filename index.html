<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社長の相棒</title>
  
  <!-- Tailwind CSS (スタイリング用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でReactコードを翻訳するため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント (外部依存をなくすためにSVGを直接埋め込み) ---
    const IconBase = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Mic = (props) => <IconBase {...props}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></IconBase>;
    const FileText = (props) => <IconBase {...props}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></IconBase>;
    const Gift = (props) => <IconBase {...props}><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" x2="12" y1="22" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></IconBase>;
    const Send = (props) => <IconBase {...props}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></IconBase>;
    const User = (props) => <IconBase {...props}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></IconBase>;
    const CheckCircle = (props) => <IconBase {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconBase>;
    const Volume2 = (props) => <IconBase {...props}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></IconBase>;
    const AlertCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></IconBase>;
    const Settings = (props) => <IconBase {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>;
    const HelpCircle = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconBase>;
    const ChevronLeft = (props) => <IconBase {...props}><polyline points="15 18 9 12 15 6"/></IconBase>;


    // --- メインアプリ ---
    function App() {
      const [currentScreen, setCurrentScreen] = useState('home'); // 'home', 'settings', 'help'
      const [activeTab, setActiveTab] = useState('voice');
      const [toastMessage, setToastMessage] = useState('');

      // トースト通知の処理
      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 3000);
      };

      return (
        <div className="flex justify-center bg-gray-100 min-h-screen">
          {/* モバイルアプリの枠組み */}
          <div className="w-full max-w-md bg-white shadow-xl relative flex flex-col h-screen overflow-hidden">
            
            {/* ヘッダー */}
            <header className="bg-blue-800 text-white p-4 shadow-md z-10 flex items-center justify-between flex-shrink-0">
              <div className="flex items-center">
                <h1 className="text-xl font-bold tracking-wider mr-2">社長の相棒</h1>
                <div className="flex items-center text-[10px] bg-blue-700 px-2 py-0.5 rounded-full border border-blue-600">
                  <CheckCircle size={10} className="mr-1 text-green-400" />
                  楽一連携
                </div>
              </div>
              <div className="flex items-center space-x-2">
                <button onClick={() => setCurrentScreen('help')} className="p-1 hover:bg-blue-700 rounded-xl transition-colors flex flex-col items-center">
                  <HelpCircle size={22} />
                  <span className="text-[10px] mt-1 font-bold">使い方</span>
                </button>
                <button onClick={() => setCurrentScreen('settings')} className="p-1 hover:bg-blue-700 rounded-xl transition-colors flex flex-col items-center">
                  <Settings size={22} />
                  <span className="text-[10px] mt-1 font-bold">設定</span>
                </button>
              </div>
            </header>

            {/* メインコンテンツ */}
            <main className={`flex-1 overflow-y-auto bg-gray-50 relative ${currentScreen === 'home' ? 'pb-24' : 'pb-6'}`}>
              {currentScreen === 'home' && activeTab === 'voice' && <VoiceTab showToast={showToast} />}
              {currentScreen === 'home' && activeTab === 'report' && <ReportTab />}
              {currentScreen === 'home' && activeTab === 'thanks' && <ThanksTab showToast={showToast} />}
              {currentScreen === 'settings' && <SettingsScreen showToast={showToast} onBack={() => setCurrentScreen('home')} />}
              {currentScreen === 'help' && <HelpScreen onBack={() => setCurrentScreen('home')} />}
            </main>

            {/* トースト通知 */}
            {toastMessage && (
              <div className="absolute top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center space-x-2 animate-bounce z-50 w-11/12 max-w-sm">
                <CheckCircle size={20} className="text-green-400" />
                <span className="font-bold">{toastMessage}</span>
              </div>
            )}

            {/* 下部ナビゲーション (3つの入り口) */}
            {currentScreen === 'home' && (
              <nav className="bg-white border-t-2 border-gray-200 flex-shrink-0 w-full flex">
                <TabButton 
                  active={activeTab === 'voice'} 
                  onClick={() => setActiveTab('voice')} 
                  icon={<Volume2 size={28} />} 
                  label="声で頼む" 
                />
                <TabButton 
                  active={activeTab === 'report'} 
                  onClick={() => setActiveTab('report')} 
                  icon={<FileText size={28} />} 
                  label="今月の報告" 
                />
                <TabButton 
                  active={activeTab === 'thanks'} 
                  onClick={() => setActiveTab('thanks')} 
                  icon={<Gift size={28} />} 
                  label="ねぎらう" 
                />
              </nav>
            )}

            {/* フッター */}
            <footer className="bg-white text-center text-[10px] text-gray-400 py-1.5 border-t border-gray-100 flex-shrink-0">
              Developed by SPC
            </footer>
          </div>
        </div>
      );
    }

    // --- 各タブのコンポーネント ---

    // 1. 声で指示を出すタブ
    function VoiceTab({ showToast }) {
      const [isRecording, setIsRecording] = useState(false);
      const [transcript, setTranscript] = useState('');
      const [isProcessing, setIsProcessing] = useState(false);

      const handleRecordClick = () => {
        if (isRecording) {
          setIsRecording(false);
          setIsProcessing(true);
          // AIが音声を文字に変換するのをシミュレート
          setTimeout(() => {
            setIsProcessing(false);
            setTranscript('「山田設備さんに、今日の追加工事分で5万円請求書出しといて。あ、急ぎでね。」');
          }, 1500);
        } else {
          setIsRecording(true);
          setTranscript('');
        }
      };

      const handleSend = () => {
        if (!transcript) return;
        showToast('事務所のパソコンに指示を送りました！');
        setTranscript('');
      };

      return (
        <div className="p-6 flex flex-col items-center justify-center h-full space-y-8">
          <div className="text-center space-y-2">
            <h2 className="text-2xl font-bold text-gray-800">事務所に指示を出す</h2>
            <p className="text-gray-600">スマホに向かって喋るだけです</p>
          </div>

          {/* 大きなマイクボタン */}
          <button 
            onClick={handleRecordClick}
            className={`w-40 h-40 rounded-full flex items-center justify-center shadow-lg transition-all duration-300 ${
              isRecording 
                ? 'bg-red-500 animate-pulse scale-110 shadow-red-200' 
                : 'bg-blue-600 hover:bg-blue-500 shadow-blue-200'
            }`}
          >
            <Mic size={64} className="text-white" />
          </button>
          
          <p className="text-xl font-bold text-red-500 h-8">
            {isRecording ? '録音中...（もう一度押して完了）' : ''}
            {isProcessing ? '文字に変換しています...' : ''}
          </p>

          {/* 文字起こし結果エリア */}
          <div className={`w-full transition-opacity duration-500 ${transcript ? 'opacity-100' : 'opacity-0'}`}>
            <div className="bg-white p-4 rounded-xl shadow border border-gray-200 mb-4">
              <p className="text-lg text-gray-800 font-medium">{transcript}</p>
            </div>
            <button 
              onClick={handleSend}
              disabled={!transcript}
              className="w-full bg-green-600 text-white text-xl font-bold py-4 rounded-xl shadow-md flex items-center justify-center space-x-2 hover:bg-green-500 active:scale-95 transition-transform"
            >
              <Send size={24} />
              <span>事務所へ送る</span>
            </button>
          </div>
        </div>
      );
    }

    // 2. シンプルな報告タブ
    function ReportTab() {
      return (
        <div className="p-6 h-full">
          <div className="mb-6">
            <h2 className="text-2xl font-bold text-gray-800 border-b-4 border-blue-600 pb-2 inline-block">今月の状況</h2>
            <p className="text-gray-500 mt-2">楽一のデータからAIが読み取りました</p>
          </div>

          <div className="space-y-6">
            <div className="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-500">
              <h3 className="text-xl font-bold text-gray-800 mb-2 flex items-center">
                <span className="text-2xl mr-2">😊</span> 良いお知らせ
              </h3>
              <p className="text-lg text-gray-700 leading-relaxed">
                社長！今月の売上は先月よりも<span className="font-bold text-red-600">良いペース</span>で進んでいます。特にA社からの注文が増えていますね。
              </p>
            </div>

            <div className="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-yellow-500">
              <h3 className="text-xl font-bold text-gray-800 mb-2 flex items-center">
                <span className="text-2xl mr-2">💡</span> 気になるポイント
              </h3>
              <p className="text-lg text-gray-700 leading-relaxed">
                B社さんからの入金が<span className="font-bold text-blue-600">まだ確認できていません。</span>来週あたり、少し様子を伺ってみてはいかがでしょうか？
              </p>
            </div>

            <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100 text-center mt-8">
              <p className="text-xl font-bold text-blue-800">
                今月もこの調子で頑張りましょう！
              </p>
            </div>
          </div>
        </div>
      );
    }

    // 3. 社員をねぎらうタブ
    function ThanksTab({ showToast }) {
      const employees = [
        { id: 1, name: '佐藤 健太', role: '営業' },
        { id: 2, name: '鈴木 美咲', role: '事務' },
        { id: 3, name: '高橋 工務', role: '現場' },
      ];

      const handleThanks = (name) => {
        showToast(`${name}さんにコーヒーチケットを送りました！`);
      };

      return (
        <div className="p-6 h-full">
          <div className="mb-6 text-center">
            <h2 className="text-2xl font-bold text-gray-800">社員をねぎらう</h2>
            <p className="text-gray-600 mt-2">頑張っている社員に、<br/>社長から「ありがとう」を贈りましょう。</p>
          </div>

          <div className="space-y-4">
            {employees.map((emp) => (
              <div key={emp.id} className="bg-white p-4 rounded-xl shadow flex items-center justify-between">
                <div className="flex items-center space-x-4">
                  <div className="bg-gray-200 p-3 rounded-full">
                    <User size={24} className="text-gray-600" />
                  </div>
                  <div>
                    <p className="text-sm text-gray-500">{emp.role}</p>
                    <p className="text-xl font-bold text-gray-800">{emp.name}</p>
                  </div>
                </div>
                
                <button 
                  onClick={() => handleThanks(emp.name)}
                  className="bg-orange-500 text-white px-4 py-3 rounded-lg font-bold shadow hover:bg-orange-400 active:scale-95 transition-transform flex flex-col items-center"
                >
                  <Gift size={20} className="mb-1" />
                  <span className="text-xs">ねぎらう</span>
                </button>
              </div>
            ))}
          </div>
          
          <div className="mt-8 bg-orange-50 p-4 rounded-xl border border-orange-200 flex items-start space-x-3">
            <AlertCircle className="text-orange-600 flex-shrink-0" />
            <p className="text-sm text-orange-800">
              「ねぎらう」を押すと、社員のLINEに社長からの感謝メッセージとデジタルのコーヒーチケット（1杯分）が届きます。
            </p>
          </div>
        </div>
      );
    }

    // ナビゲーションのボタンコンポーネント
    function TabButton({ active, onClick, icon, label }) {
      return (
        <button 
          onClick={onClick}
          className={`flex-1 flex flex-col items-center justify-center py-3 transition-colors duration-200 ${
            active ? 'text-blue-700 bg-blue-50' : 'text-gray-500 hover:bg-gray-50'
          }`}
        >
          <div className={`mb-1 ${active ? 'animate-bounce' : ''}`}>
            {icon}
          </div>
          <span className={`text-xs font-bold ${active ? 'text-blue-800' : ''}`}>{label}</span>
          {active && <div className="w-1/2 h-1 bg-blue-700 rounded-full mt-1"></div>}
        </button>
      );
    }

    // --- 新しい画面 ---

    // 設定画面
    function SettingsScreen({ showToast, onBack }) {
      const [companyName, setCompanyName] = useState('株式会社〇〇');
      const [presidentName, setPresidentName] = useState('山田 太郎');
      const [showClearConfirm, setShowClearConfirm] = useState(false);
      const [showSaveConfirm, setShowSaveConfirm] = useState(false);

      const handleSave = () => {
        setShowSaveConfirm(true);
      };

      const handleClear = () => {
        setShowClearConfirm(false);
        showToast('デモデータをクリアしました。');
      };

      return (
        <div className="p-6 h-full flex flex-col bg-gray-50">
          <div className="flex items-center mb-6">
            <button onClick={onBack} className="mr-4 text-gray-600 p-2 bg-gray-200 rounded-full hover:bg-gray-300">
              <ChevronLeft size={28} />
            </button>
            <h2 className="text-2xl font-bold text-gray-800">設定</h2>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <h3 className="text-xl font-bold text-gray-800 mb-5 border-b-2 border-gray-100 pb-2">基本情報</h3>
            <div className="space-y-6">
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">会社名</label>
                <input 
                  type="text" 
                  value={companyName} 
                  onChange={(e) => setCompanyName(e.target.value)}
                  className="w-full border-2 border-gray-300 rounded-xl p-4 text-lg bg-gray-50 focus:bg-white focus:border-blue-500 focus:outline-none transition-colors"
                />
              </div>
              <div>
                <label className="block text-base font-bold text-gray-700 mb-2">社長のお名前</label>
                <input 
                  type="text" 
                  value={presidentName} 
                  onChange={(e) => setPresidentName(e.target.value)}
                  className="w-full border-2 border-gray-300 rounded-xl p-4 text-lg bg-gray-50 focus:bg-white focus:border-blue-500 focus:outline-none transition-colors"
                />
              </div>
              <button 
                onClick={handleSave} 
                className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-4 shadow-md text-xl hover:bg-blue-500 active:scale-95 transition-transform"
              >
                保存する
              </button>
            </div>
          </div>

          <div className="mt-auto pt-8 pb-4 text-center">
            <button 
              onClick={() => setShowClearConfirm(true)}
              className="text-gray-400 text-sm border-b border-gray-300 pb-1 hover:text-gray-600"
            >
              デモデータをクリア
            </button>
          </div>

          {/* 保存確認モーダル */}
          {showSaveConfirm && (
            <div className="absolute inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl text-center transform transition-all">
                <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
                  <CheckCircle className="h-10 w-10 text-green-600" />
                </div>
                <h3 className="text-2xl font-bold text-gray-800 mb-2">保存完了</h3>
                <p className="text-lg text-gray-600 mb-8">基本情報を正しく保存しました。</p>
                <button 
                  onClick={() => { setShowSaveConfirm(false); onBack(); }} 
                  className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl text-xl hover:bg-blue-500"
                >
                  OK
                </button>
              </div>
            </div>
          )}

          {/* クリア確認モーダル */}
          {showClearConfirm && (
            <div className="absolute inset-0 bg-gray-900 bg-opacity-60 flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl text-center transform transition-all">
                <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-4">
                  <AlertCircle className="h-10 w-10 text-red-600" />
                </div>
                <h3 className="text-2xl font-bold text-gray-800 mb-2">確認</h3>
                <p className="text-lg text-gray-600 mb-8 leading-relaxed">
                  本当にデモデータをクリアしますか？<br/>
                  <span className="text-red-500 font-bold text-sm">※この操作は元に戻せません。</span>
                </p>
                <div className="flex space-x-4">
                  <button 
                    onClick={() => setShowClearConfirm(false)} 
                    className="flex-1 bg-gray-200 text-gray-800 font-bold py-4 rounded-xl text-lg hover:bg-gray-300"
                  >
                    やめる
                  </button>
                  <button 
                    onClick={handleClear} 
                    className="flex-1 bg-red-600 text-white font-bold py-4 rounded-xl text-lg hover:bg-red-500 shadow-md"
                  >
                    クリアする
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 使い方画面
    function HelpScreen({ onBack }) {
      return (
        <div className="p-6 h-full flex flex-col bg-gray-50 overflow-y-auto">
          <div className="flex items-center mb-6">
            <button onClick={onBack} className="mr-4 text-gray-600 p-2 bg-gray-200 rounded-full hover:bg-gray-300">
              <ChevronLeft size={28} />
            </button>
            <h2 className="text-2xl font-bold text-gray-800">使い方</h2>
          </div>

          <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-6">
            <h3 className="text-xl font-bold text-blue-800 mb-4 border-b-2 border-blue-100 pb-2">このアプリの目的</h3>
            <p className="text-lg text-gray-700 leading-relaxed font-medium">
              社長の毎日の負担を減らすためのアプリです。<br/><br/>
              難しい機械の操作は一切必要ありません。<br/>
              会社の状況をパッと把握し、頑張る社員への「ありがとう」を簡単に伝えることができます。
            </p>
          </div>

          <div className="space-y-5">
            <div className="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-blue-500">
              <div className="flex items-center mb-3">
                <Volume2 className="text-blue-600 mr-3" size={28} />
                <h4 className="text-xl font-bold text-gray-800">1. 声で頼む</h4>
              </div>
              <ul className="text-base text-gray-700 space-y-2 ml-1 leading-relaxed">
                <li>・マイクのボタンを押して、スマホに話しかけます。</li>
                <li>・もう一度押すと、話した言葉が文字に変わります。</li>
                <li>・「送る」を押すだけで、事務所のパソコンに指示が届きます。</li>
              </ul>
            </div>

            <div className="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-green-500">
              <div className="flex items-center mb-3">
                <FileText className="text-green-600 mr-3" size={28} />
                <h4 className="text-xl font-bold text-gray-800">2. 今月の報告</h4>
              </div>
              <ul className="text-base text-gray-700 space-y-2 ml-1 leading-relaxed">
                <li>・楽一のデータから、今月の状況をAIが自動でまとめます。</li>
                <li>・細かいグラフや表は見ず、短い言葉で大事なことだけを確認できます。</li>
              </ul>
            </div>

            <div className="bg-white p-5 rounded-2xl shadow-sm border-l-8 border-orange-500">
              <div className="flex items-center mb-3">
                <Gift className="text-orange-600 mr-3" size={28} />
                <h4 className="text-xl font-bold text-gray-800">3. ねぎらう</h4>
              </div>
              <ul className="text-base text-gray-700 space-y-2 ml-1 leading-relaxed">
                <li>・頑張っている社員を選んで「ねぎらう」ボタンを押します。</li>
                <li>・社長からの「ありがとう」というメッセージと、コーヒー1杯分のチケットが社員のスマホに届きます。</li>
              </ul>
            </div>
          </div>
          
          <div className="mt-8 mb-4 text-center">
            <button 
              onClick={onBack}
              className="bg-gray-800 text-white font-bold py-4 px-12 rounded-full text-lg shadow-md hover:bg-gray-700"
            >
              最初の画面に戻る
            </button>
          </div>
        </div>
      );
    }

    // Reactアプリの起動
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
